body:
  text: 謝氏鬼神列傳下邳陳超為鬼君弼所逐改名何規從餘杭步道還求福絶不敢出入五年後意漸替解與親舊臨水戲酒酣共説往來超云不復畏此鬼也小俯首乃見鬼影在水中超驚怖時亦有乘馬者超借馬騎之下鞭奔驅此鬼與超遠近常如初微聞鬼云汝何規耶急急就死御覽三百五十九
